name: CI

# 把「完成标准」在 PR / push 上机器化强制执行，给 Agent 自检加兜底。
# 注意：不跑 `npm run build`，因为其 prebuild 会联网抓取主网链尖高度；
# 链尖回退文件已提交，lint / typecheck / test 无需该步骤。

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Doc health
        run: npm run doc:health

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test
