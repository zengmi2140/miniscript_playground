name: CI

# 把「完成标准」在 PR / push 上机器化强制执行，给 Agent 自检加兜底。
# CI 使用 `build:check` 跳过会联网刷新链尖回退文件的 prebuild；
# 正式部署仍使用 `npm run build` 获取最新回退高度。

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Doc health
        run: npm run doc:health

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test with coverage
        run: npm run test:coverage

      - name: Production build check
        run: npm run build:check
